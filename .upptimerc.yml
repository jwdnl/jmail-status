owner: jwdnl
repo: jmail-status

sites:
  - name: JMail web app
    url: https://jmail.wedare.net
  - name: JMAP API (mail server)
    # Unauthenticated hit on the JMAP well-known answers 401 — that IS "up".
    url: https://mail.wedare.net/.well-known/jmap
    expectedStatusCodes:
      - 401
      - 200
  - name: SMTP inbound (port 25)
    check: "tcp-ping"
    url: mail.wedare.net
    port: 25
  - name: SMTP submission (port 465)
    check: "tcp-ping"
    url: mail.wedare.net
    port: 465

assignees:
  - jwdnl

status-website:
  baseUrl: /jmail-status
  name: JMail status
  introTitle: "**JMail** service status — web app and mail server, checked every ~5 minutes from GitHub's network."
  introMessage: "This page is hosted outside JMail's own infrastructure on purpose — it stays up when we don't. Questions? [support@wedare.net](mailto:support@wedare.net) · [jmail.wedare.net](https://jmail.wedare.net)"
  navbar:
    - title: Status
      href: /
    - title: JMail
      href: https://jmail.wedare.net
    - title: Support
      href: https://jmail.wedare.net/support
