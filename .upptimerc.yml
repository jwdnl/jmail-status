owner: jwdnl
repo: jmail-status

sites:
  - name: Jaymail web app
    url: https://app.jaymail.app
  - name: JMAP API (mail server)
    # Unauthenticated hit on the JMAP well-known answers 401 — that IS "up".
    url: https://mail.wedare.net/.well-known/jmap
    expectedStatusCodes:
      - 401
      - 200
  - name: SMTP inbound (port 25)
    check: "tcp-ping"
    url: mail.wedare.net
    port: 25
  - name: SMTP submission (port 465)
    check: "tcp-ping"
    url: mail.wedare.net
    port: 465

assignees:
  - jwdnl

status-website:
  baseUrl: /jmail-status
  name: Jaymail status
  introTitle: "**Jaymail** service status — web app and mail server, checked every ~5 minutes from GitHub's network."
  introMessage: "This page is hosted outside Jaymail's own infrastructure on purpose — it stays up when we don't. Questions? [support@jdstudio.app](mailto:support@jdstudio.app) · [app.jaymail.app](https://app.jaymail.app)"
  navbar:
    - title: Status
      href: /
    - title: Jaymail
      href: https://app.jaymail.app
    - title: Support
      href: https://app.jaymail.app/support
